<!-- PEMANGGILAN SCRIPT UTAMA -->
<script src="pengaturan.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// 1. Inisialisasi Supabase menggunakan file pengaturan.js
const supabaseClient = supabase.createClient(CONFIG_APP.supabaseUrl, CONFIG_APP.supabaseKey);

// Jalankan fungsi otomatis saat halaman admin selesai dimuat
document.addEventListener('DOMContentLoaded', () => {
    // Cek status login (jika kamu pakai sistem session/password)
    loadBookingData();
    
    // Pasang event listener ke form input manual
    const adminForm = document.getElementById('adminBookingForm');
    if (adminForm) {
        adminForm.addEventListener('submit', saveManualBooking);
    }
});

// 2. Fungsi Mengambil Data Klien dari Database (Menampilkan ke Tabel Dashboard)
async function loadBookingData() {
    try {
        // PERBAIKAN: Mengubah tabel dari 'clients' menjadi 'bookings'
        const { data, error } = await supabaseClient
            .from('bookings')
            .select('*')
            .order('id', { ascending: false });

        if (error) throw error;

        const tableBody = document.getElementById('bookingTableBody');
        if (!tableBody) return;
        
        tableBody.innerHTML = '';

        if (data.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="9" style="text-align:center;">Belum ada data order masuk.</td></tr>`;
            return;
        }

        data.forEach((item, index) => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${index + 1}</td>
                <td>${item.nama}</td>
                <td>${item.whatsapp}</td>
                <td>${item.tanggal} (${item.jam})</td>
                <td>${item.lokasi} / ${item.kampus}</td>
                <td>${item.paket}</td>
                <td>
                    <span class="badge ${item.status === 'Lunas' ? 'bg-success' : 'bg-warning'}">
                        ${item.status}
                    </span>
                </td>
                <td>
                    <button class="btn btn-sm btn-info" onclick="generateGalleryLink('${item.nama}', '${item.whatsapp}')">Link Galeri</button>
                    <button class="btn btn-sm btn-success" onclick="updateStatusLunas(${item.id})">Set Lunas</button>
                </td>
            `;
            tableBody.appendChild(row);
        });

    } catch (err) {
        console.error("Gagal memuat data:", err);
        // Menampilkan pesan error spesifik agar gampang di-troubleshoot jika domain bermasalah
        alert("Gagal memuat data dari database.\nAlasan: " + (err.message || "Masalah jaringan/DNS Supabase"));
    }
}

// 3. Fungsi Menyimpan Data Klien Baru via Form Admin
async function saveManualBooking(event) {
    event.preventDefault();

    // Ambil data dari form input admin
    const nama = document.getElementById('clientName').value;
    const whatsapp = document.getElementById('clientWhatsapp').value;
    const tanggal = document.getElementById('clientDate').value;
    const jam = document.getElementById('clientTime').value;
    const lokasi = document.getElementById('clientLocation').value;
    const kampus = document.getElementById('clientCampus').value;
    const paket = document.getElementById('clientPackage').value;
    const sosmed = document.getElementById('clientSosmed').value;
    const mua = document.getElementById('clientMua').value;
    const dress = document.getElementById('clientDress').value;

    try {
        // PERBAIKAN: Mengubah tabel dari 'clients' menjadi 'bookings'
        const { error } = await supabaseClient
            .from('bookings')
            .insert([{
                nama,
                whatsapp,
                tanggal,
                jam,
                lokasi,
                kampus,
                paket,
                sosmed,
                mua,
                dress,
                status: 'Pending'
            }]);

        if (error) throw error;

        alert('Data Klien Berhasil Disimpan ke Database!');
        document.getElementById('adminBookingForm').reset();
        
        // Muat ulang isi tabel agar data baru langsung muncul
        loadBookingData();

    } catch (err) {
        console.error("Gagal menyimpan data:", err);
        alert('Gagal menyimpan data.\nAlasan: ' + (err.message || 'Koneksi terputus/Nama tabel salah'));
    }
}

// 4. Fungsi Mengubah Status Pembayaran Menjadi Lunas
async function updateStatusLunas(id) {
    try {
        const { error } = await supabaseClient
            .from('bookings')
            .update({ status: 'Lunas' })
            .eq('id', id);

        if (error) throw error;

        alert('Status pembayaran berhasil diubah menjadi Lunas!');
        loadBookingData();

    } catch (err) {
        console.error(err);
        alert('Gagal memperbarui status: ' + err.message);
    }
}

// 5. Fungsi Generate Link Galeri Unik Klien
function generateGalleryLink(nama, whatsapp) {
    // Ubah nama menjadi huruf kecil dan hilangkan spasi untuk URL slug
    const slug = nama.toLowerCase().replace(/[^a-z0-9]/g, '-');
    const baseUrl = window.location.origin;
    const linkGaleri = `${baseUrl}/gallery?client=${slug}&phone=${whatsapp}`;
    
    // Tampilkan link dan salin otomatis ke clipboard
    navigator.clipboard.writeText(linkGaleri).then(() => {
        alert(`Link galeri untuk ${nama} berhasil dibuat & disalin:\n${linkGaleri}`);
    }).catch(() => {
        alert(`Link galeri untuk ${nama}:\n${linkGaleri}`);
    });
}
</script>
