<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - VIVIDLENS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container my-5">
        <h2 class="mb-4">Dashboard Admin - Booking System</h2>
        
        <div class="card mb-5 shadow-sm">
            <div class="card-header bg-primary text-white">Input Data Booking Manual</div>
            <div class="card-body">
                <form id="adminBookingForm">
                    <div class="row g-3">
                        <div class="col-md-4"><input type="text" id="clientName" class="form-control" placeholder="Nama Klien" required></div>
                        <div class="col-md-4"><input type="text" id="clientWhatsapp" class="form-control" placeholder="No WhatsApp" required></div>
                        <div class="col-md-4"><input type="date" id="clientDate" class="form-control" required></div>
                        <div class="col-md-4"><input type="time" id="clientTime" class="form-control" required></div>
                        <div class="col-md-4"><input type="text" id="clientLocation" class="form-control" placeholder="Lokasi Foto" required></div>
                        <div class="col-md-4"><input type="text" id="clientCampus" class="form-control" placeholder="Asal Kampus" required></div>
                        <div class="col-md-4">
                            <select id="clientPackage" class="form-select" required>
                                <option value="" disabled selected>Pilih Paket Foto...</option>
                                <option value="Bronze 30 Menit">Bronze 30 Menit - Rp285.000</option>
                                <option value="Bronze">Bronze - Rp325.000</option>
                                <option value="Silver">Silver - Rp350.000</option>
                                <option value="Gold">Gold - Rp450.000</option>
                                <option value="Premium">Premium - Rp1.000.000</option>
                            </select>
                        </div>
                        <div class="col-md-4"><input type="text" id="clientSosmed" class="form-control" placeholder="Sosmed Klien"></div>
                        <div class="col-md-4"><input type="text" id="clientMua" class="form-control" placeholder="Info MUA"></div>
                        <div class="col-md-4"><input type="text" id="clientDress" class="form-control" placeholder="Info Dress"></div>
                    </div>
                    <button type="submit" class="btn btn-primary mt-3">Simpan Data Klien</button>
                </form>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">Daftar Pesanan</div>
            <div class="table-responsive">
                <table class="table table-striped table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Nama</th>
                            <th>Jadwal</th>
                            <th>Paket</th>
                            <th>Status</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="bookingTableBody">
                        <tr><td colspan="5" class="text-center">Memuat...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="pengaturan.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
    const supabaseClient = supabase.createClient(CONFIG_APP.supabaseUrl, CONFIG_APP.supabaseKey);

    async function loadBookingData() {
        const { data } = await supabaseClient.from('bookings').select('*').order('id', { ascending: false });
        const tableBody = document.getElementById('bookingTableBody');
        if (!data || data.length === 0) { tableBody.innerHTML = '<tr><td colspan="5" class="text-center">Belum ada data.</td></tr>'; return; }
        
        tableBody.innerHTML = data.map(item => `
            <tr>
                <td>${item.nama}</td>
                <td>${item.tanggal} ${item.jam}</td>
                <td>${item.paket}</td>
                <td><span class="badge ${item.status === 'Lunas' ? 'bg-success' : 'bg-warning'}">${item.status}</span></td>
                <td><button class="btn btn-sm btn-success" onclick="updateStatusLunas(${item.id})">Lunas</button></td>
            </tr>
        `).join('');
    }

    document.getElementById('adminBookingForm').onsubmit = async (e) => {
        e.preventDefault();
        const { error } = await supabaseClient.from('bookings').insert([{
            nama: document.getElementById('clientName').value,
            whatsapp: document.getElementById('clientWhatsapp').value,
            tanggal: document.getElementById('clientDate').value,
            jam: document.getElementById('clientTime').value,
            lokasi: document.getElementById('clientLocation').value,
            kampus: document.getElementById('clientCampus').value,
            paket: document.getElementById('clientPackage').value,
            status: 'Pending'
        }]);
        if (error) { alert("Gagal simpan, cek koneksi!"); } else { alert("Sukses!"); loadBookingData(); }
    };

    async function updateStatusLunas(id) {
        await supabaseClient.from('bookings').update({ status: 'Lunas' }).eq('id', id);
        loadBookingData();
    }

    loadBookingData();
    </script>
</body>
</html>
