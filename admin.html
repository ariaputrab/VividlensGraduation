<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - VIVIDLENS</title>
    <!-- Menggunakan Bootstrap agar tampilan rapi -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container my-5">
        <h2 class="mb-4">Dashboard Admin - Booking System</h2>
        
        <!-- Form Input Data Manual -->
        <div class="card mb-5 shadow-sm">
            <div class="card-header bg-primary text-white">Input Data Booking Manual</div>
            <div class="card-body">
                <form id="adminBookingForm">
                    <div class="row g-3">
                        <div class="col-md-4"><input type="text" id="clientName" class="form-control" placeholder="Nama Klien" required></div>
                        <div class="col-md-4"><input type="text" id="clientWhatsapp" class="form-control" placeholder="No WhatsApp" required></div>
                        <div class="col-md-4"><input type="date" id="clientDate" class="form-control" required></div>
                        <div class="col-md-4"><input type="time" id="clientTime" class="form-control" required></div>
                        <div class="col-md-4"><input type="text" id="clientLocation" class="form-control" placeholder="Lokasi Foto" required></div>
                        <div class="col-md-4"><input type="text" id="clientCampus" class="form-control" placeholder="Asal Kampus" required></div>
                        
                        <!-- Dropdown Pilihan Paket Sesuai Pricelist VIVIDLENS -->
                        <div class="col-md-4">
                            <select id="clientPackage" class="form-select" required>
                                <option value="" disabled selected>Pilih Paket Foto...</option>
                                <option value="Bronze 30 Menit (285k)">Bronze 30 Menit - Rp285.000</option>
                                <option value="Bronze (325k)">Bronze - Rp325.000</option>
                                <option value="Silver (350k)">Silver - Rp350.000</option>
                                <option value="Gold (450k)">Gold - Rp450.000</option>
                                <option value="Premium (1.000k)">Premium - Rp1.000.000</option>
                            </select>
                        </div>

                        <div class="col-md-4"><input type="text" id="clientSosmed" class="form-control" placeholder="Sosmed Klien"></div>
                        <div class="col-md-4"><input type="text" id="clientMua" class="form-control" placeholder="Info MUA"></div>
                        <div class="col-md-4"><input type="text" id="clientDress" class="form-control" placeholder="Info Dress"></div>
                    </div>
                    <button type="submit" class="btn btn-primary mt-3">Simpan Data Klien</button>
                </form>
            </div>
        </div>

        <!-- Tabel Data -->
        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">Daftar Pesanan (Bookings)</div>
            <div class="table-responsive">
                <table class="table table-striped table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>No</th>
                            <th>Nama</th>
                            <th>WhatsApp</th>
                            <th>Jadwal</th>
                            <th>Lokasi/Kampus</th>
                            <th>Paket</th>
                            <th>Status</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="bookingTableBody">
                        <tr>
                            <td colspan="8" style="text-align:center;">Sedang memuat data dari database...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- PEMANGGILAN SCRIPT UTAMA -->
    <script src="pengaturan.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
    // Inisialisasi Supabase
    const supabaseClient = supabase.createClient(CONFIG_APP.supabaseUrl, CONFIG_APP.supabaseKey);

    document.addEventListener('DOMContentLoaded', () => {
        loadBookingData();
        const adminForm = document.getElementById('adminBookingForm');
        if (adminForm) {
            adminForm.addEventListener('submit', saveManualBooking);
        }
    });

    // Ambil Data dari Database
    async function loadBookingData() {
        try {
            const { data, error } = await supabaseClient
                .from('bookings')
                .select('*')
                .order('id', { ascending: false });

            if (error) throw error;

            const tableBody = document.getElementById('bookingTableBody');
            if (!tableBody) return;
            
            tableBody.innerHTML = '';

            if (data.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="8" style="text-align:center;">Belum ada data order masuk.</td></tr>`;
                return;
            }

            data.forEach((item, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${item.nama}</td>
                    <td>${item.whatsapp}</td>
                    <td>${item.tanggal} (${item.jam})</td>
                    <td>${item.lokasi} / ${item.kampus}</td>
                    <td>${item.paket}</td>
                    <td>
                        <span class="badge ${item.status === 'Lunas' ? 'bg-success' : 'bg-warning'}">
                            ${item.status}
                        </span>
                    </td>
                    <td>
                        <button class="btn btn-sm btn-info" onclick="generateGalleryLink('${item.nama}', '${item.whatsapp}')">Link Galeri</button>
                        <button class="btn btn-sm btn-success" onclick="updateStatusLunas(${item.id})">Set Lunas</button>
                    </td>
                `;
                tableBody.appendChild(row);
            });

        } catch (err) {
            console.error("Gagal memuat data:", err);
            alert("Gagal memuat data dari database.\nAlasan: " + (err.message || "Masalah jaringan"));
        }
    }

    // Simpan Data
    async function saveManualBooking(event) {
        event.preventDefault();

        const nama = document.getElementById('clientName').value;
        const whatsapp = document.getElementById('clientWhatsapp').value;
        const tanggal = document.getElementById('clientDate').value;
        const jam = document.getElementById('clientTime').value;
        const lokasi = document.getElementById('clientLocation').value;
        const kampus = document.getElementById('clientCampus').value;
        const paket = document.getElementById('clientPackage').value;
        const sosmed = document.getElementById('clientSosmed').value;
        const mua = document.getElementById('clientMua').value;
        const dress = document.getElementById('clientDress').value;

        try {
            const { error } = await supabaseClient
                .from('bookings')
                .insert([{
                    nama, whatsapp, tanggal, jam, lokasi, kampus, paket, sosmed, mua, dress, status: 'Pending'
                }]);

            if (error) throw error;

            alert('Data Klien Berhasil Disimpan!');
            document.getElementById('adminBookingForm').reset();
            loadBookingData();

        } catch (err) {
            console.error("Gagal menyimpan data:", err);
            alert('Gagal menyimpan data.\nAlasan: ' + err.message);
        }
    }

    // Update Status Lunas
    async function updateStatusLunas(id) {
        try {
            const { error } = await supabaseClient
                .from('bookings')
                .update({ status: 'Lunas' })
                .eq('id', id);

            if (error) throw error;

            alert('Status pembayaran diubah menjadi Lunas!');
            loadBookingData();

        } catch (err) {
            console.error(err);
            alert('Gagal memperbarui status: ' + err.message);
        }
    }

    // Generate Link Galeri
    function generateGalleryLink(nama, whatsapp) {
        const slug = nama.toLowerCase().replace(/[^a-z0-9]/g, '-');
        const baseUrl = window.location.origin;
        const linkGaleri = `${baseUrl}/gallery?client=${slug}&phone=${whatsapp}`;
        
        navigator.clipboard.writeText(linkGaleri).then(() => {
            alert(`Link galeri berhasil disalin:\n${linkGaleri}`);
        }).catch(() => {
            alert(`Link galeri:\n${linkGaleri}`);
        });
    }
    </script>
</body>
</html>
